<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Check the Browser Console to see the Filtered List</h3>
    <script>

        const people = [
        "Alice Anderson",
        "Aaron Adams",
        "Bella Brown",
        "Brian Black",
        "Cathy Carter",
        "Charles Cooper",
        "Diana Davis",
        "Daniel Drake",
        "Ella Evans",
        "Ethan Edwards",
        "Fiona Fisher",
        "Frank Foster",
        "Grace Green",
        "Gavin Gray",
        "Hannah Harris",
        "Henry Hill",
        "Isabella Ingram",
        "Ian Irving",
        "Jack Johnson",
        "Julia James"
    ];


    const targetLetter = "B";


    const result = people.filter((person) => {
        // Check if the first character matches our target letter
        return person.charAt(0) === targetLetter;
    });

      // 4. Display the filtered list in the console
    console.log(`Names starting with "${targetLetter}":`, result);
    </script>
</body>
</html>
